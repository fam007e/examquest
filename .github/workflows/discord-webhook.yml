name: Discord Webhook Notification

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, closed, reopened]
  pull_request_review:
    types: [submitted, edited, dismissed]
  issues:
    types: [opened, closed, reopened]
  release:
    types: [published, edited, released]
  check_run:
    types: [completed]
  check_suite:
    types: [completed]
  deployment:
  deployment_status:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check if Discord webhook URL is set
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "Error: DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi

      - name: Send notification to Discord for Push
        if: github.event_name == 'push'
        env:
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          CONTENT=$(printf '%b' \
            "\U0001F680 **Push Event** in \`${REPOSITORY}\` by **${ACTOR}**\n" \
            "\n" \
            "Branch: \`${REF_NAME}\`\n" \
            "Commit: [\`${SHA}\`](${COMMIT_URL})")
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content": $content}')
          curl -sfS -X POST \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"

      - name: Send notification to Discord for Pull Request
        if: github.event_name == 'pull_request'
        env:
          ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          LABEL="${ACTION^}"
          CONTENT=$(printf '%b' \
            "\U0001F4CB **Pull Request ${LABEL}** in \`${REPOSITORY}\` by **${ACTOR}**\n" \
            "\n" \
            "[#${PR_NUMBER}: ${PR_TITLE}](${PR_URL})")
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content": $content}')
          curl -sfS -X POST \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"

      - name: Send notification to Discord for Pull Request Review
        if: github.event_name == 'pull_request_review'
        env:
          REVIEW_STATE: ${{ github.event.review.state }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          LABEL="${REVIEW_STATE^}"
          CONTENT=$(printf '%b' \
            "\U0001F440 **Pull Request Review ${LABEL}** in \`${REPOSITORY}\` by **${ACTOR}**\n" \
            "\n" \
            "[#${PR_NUMBER}: ${PR_TITLE}](${PR_URL})")
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content": $content}')
          curl -sfS -X POST \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"

      - name: Send notification to Discord for Issues
        if: github.event_name == 'issues'
        env:
          ACTION: ${{ github.event.action }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          LABEL="${ACTION^}"
          CONTENT=$(printf '%b' \
            "\U0001F41B **Issue ${LABEL}** in \`${REPOSITORY}\` by **${ACTOR}**\n" \
            "\n" \
            "[#${ISSUE_NUMBER}: ${ISSUE_TITLE}](${ISSUE_URL})")
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content": $content}')
          curl -sfS -X POST \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"

      - name: Send notification to Discord for Release
        if: github.event_name == 'release'
        env:
          ACTION: ${{ github.event.action }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPOSITORY: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          LABEL="${ACTION^}"
          CONTENT=$(printf '%b' \
            "\U0001F389 **Release ${LABEL}** in \`${REPOSITORY}\`\n" \
            "\n" \
            "[${RELEASE_NAME} (${RELEASE_TAG})](${RELEASE_URL})")
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content": $content}')
          curl -sfS -X POST \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"

      - name: Send notification to Discord for Check Run
        if: github.event_name == 'check_run'
        env:
          CHECK_NAME: ${{ github.event.check_run.name }}
          CHECK_STATUS: ${{ github.event.check_run.status }}
          CHECK_CONCLUSION: ${{ github.event.check_run.conclusion }}
          REPOSITORY: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          CONTENT=$(printf '%b' \
            "\u2705 **Check Run Completed** in \`${REPOSITORY}\`\n" \
            "\n" \
            "Check: \`${CHECK_NAME}\`\n" \
            "Status: ${CHECK_STATUS}\n" \
            "Result: ${CHECK_CONCLUSION}")
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content": $content}')
          curl -sfS -X POST \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"

      - name: Send notification to Discord for Check Suite
        if: github.event_name == 'check_suite'
        env:
          CHECK_STATUS: ${{ github.event.check_suite.status }}
          CHECK_CONCLUSION: ${{ github.event.check_suite.conclusion }}
          REPOSITORY: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          CONTENT=$(printf '%b' \
            "\U0001F4CA **Check Suite Completed** in \`${REPOSITORY}\`\n" \
            "\n" \
            "Status: ${CHECK_STATUS}\n" \
            "Result: ${CHECK_CONCLUSION}")
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content": $content}')
          curl -sfS -X POST \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"

      - name: Send notification to Discord for Deployment
        if: github.event_name == 'deployment' || github.event_name == 'deployment_status'
        env:
          EVENT_NAME: ${{ github.event_name }}
          DEPLOY_ENV: ${{ github.event.deployment.environment }}
          DEPLOY_STATUS: ${{ github.event.deployment_status.state }}
          REPOSITORY: ${{ github.repository }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ "$EVENT_NAME" = "deployment_status" ]; then
            STATUS_UPPER="${DEPLOY_STATUS^^}"
            CONTENT=$(printf '%b' \
              "\U0001F680 **Deployment Status: ${STATUS_UPPER}** in \`${REPOSITORY}\`\n" \
              "\n" \
              "Environment: \`${DEPLOY_ENV}\`")
          else
            CONTENT=$(printf '%b' \
              "\U0001F680 **Deployment Created** in \`${REPOSITORY}\`\n" \
              "\n" \
              "Environment: \`${DEPLOY_ENV}\`")
          fi
          PAYLOAD=$(jq -n --arg content "$CONTENT" '{"content": $content}')
          curl -sfS -X POST \
               -H "Content-Type: application/json" \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"
